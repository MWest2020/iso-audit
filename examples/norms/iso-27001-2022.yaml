metadata:
  standard: ISO 27001:2022
  slug: iso-27001-2022
  source: iso_audit.data.normteksten (verkorte NL-weergave, repo-bron) — geen officiële ISO-volledige
    tekst
clauses:
  '5.11':
    title_nl: Retournering van activa
    title_en: ''
    text_nl: Procedures voor de teruggave of vernietiging van informatie en andere daarmee
      samenhangende activa bij beëindiging of wijziging van het dienstverband of contract
      moeten worden gedefinieerd en geïmplementeerd.
    text_en: ''
  '5.18':
    title_nl: Toegangsrechten
    title_en: ''
    text_nl: Toegangsrechten tot informatie en andere daarmee samenhangende activa moeten
      worden verstrekt, beoordeeld, gewijzigd en ingetrokken overeenkomstig het themaspecifieke
      beleid en de regels van de organisatie.
    text_en: ''
  '5.24':
    title_nl: Planning en voorbereiding van het beheer van informatiebeveiligingsincidenten
    title_en: ''
    text_nl: De organisatie moet plannen en zich voorbereiden op het beheren van informatiebeveiligingsincidenten
      door rollen, verantwoordelijkheden en procedures te definiëren voor incidentrespons.
    text_en: ''
  '5.27':
    title_nl: Leren van informatiebeveiligingsincidenten
    title_en: ''
    text_nl: Kennis opgedaan uit informatiebeveiligingsincidenten moet worden gebruikt om
      de kans op of gevolgen van toekomstige incidenten te verkleinen.
    text_en: ''
  '6.3':
    title_nl: Bewustzijn, opleiding en training op het gebied van informatiebeveiliging
    title_en: ''
    text_nl: Medewerkers en relevante contractanten moeten passend bewustzijn, onderwijs en
      opleiding ontvangen over informatiebeveiliging en regelmatige updates van het beleid.
    text_en: ''
  '6.5':
    title_nl: Verantwoordelijkheden na beëindiging of wijziging van het dienstverband
    title_en: ''
    text_nl: Informatiebeveiligingsverantwoordelijkheden en -verplichtingen die van kracht
      blijven na beëindiging of wijziging van het dienstverband moeten worden gedefinieerd,
      gecommuniceerd en gehandhaafd.
    text_en: ''
  '8.13':
    title_nl: Back-up van informatie
    title_en: ''
    text_nl: Back-upkopieën van informatie, software en systemen moeten worden gemaakt en
      regelmatig worden getest overeenkomstig het overeengekomen themaspecifieke beleid voor
      back-up.
    text_en: ''
  '8.15':
    title_nl: Logging
    title_en: ''
    text_nl: Logboeken die activiteiten, uitzonderingen, fouten en andere relevante gebeurtenissen
      vastleggen, moeten worden geproduceerd, opgeslagen, beschermd en geanalyseerd.
    text_en: ''
  '8.16':
    title_nl: Bewakingsactiviteiten
    title_en: ''
    text_nl: Netwerken en systemen moeten worden gemonitord op afwijkend gedrag en passende
      maatregelen moeten worden genomen om potentiële informatiebeveiligingsincidenten te
      evalueren.
    text_en: ''
